; PlatformIO project for nice!nano (nRF52840) — nRF24L01 Interference Jammer
; Flash: double-tap RST to enter bootloader, then run:
;   pio run --target upload
; Monitor:
;   pio device monitor

[env:nice_nano]
platform  = nordicnrf52
board     = adafruit_feather_nrf52840
framework = arduino

lib_deps =
    nrf24/RF24@^1.4.8

upload_protocol = nrfutil
monitor_speed   = 115200

; Ensure USB serial is available via TinyUSB (required on nRF52840 Arduino)
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUSB_MCU=OPT_MCU_NRF5X
